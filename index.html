<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>منصّة حجز الورش التدريبية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Reem+Kufi:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c2a2a;
  --teal:#0f4c4c;
  --teal-700:#0a3a3a;
  --emerald:#13a181;
  --emerald-soft:#e7f6f1;
  --gold:#c79a3b;
  --gold-soft:#f7efdc;
  --busy:#b9c2c2;
  --busy-bg:#eef1f1;
  --surface:#ffffff;
  --bg:#f4f6f5;
  --line:#e4e9e8;
  --danger:#c0413b;
  --shadow:0 10px 34px -16px rgba(8,40,40,.35);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,.brand-name{font-family:'Reem Kufi',sans-serif}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.hidden{display:none !important}
a{text-decoration:none}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,var(--teal),var(--teal-700));
  color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:12px}
.brand .logo{width:42px;height:42px;border-radius:12px;background:radial-gradient(circle at 30% 30%,var(--gold),#9a7320);
  display:grid;place-items:center;color:#1c1300;font-weight:800;font-size:20px;font-family:'Reem Kufi';box-shadow:inset 0 0 0 2px rgba(255,255,255,.25)}
.brand-name{font-size:20px;font-weight:700;letter-spacing:.3px}
.brand small{display:block;font-family:'Tajawal';font-weight:400;opacity:.7;font-size:12px;letter-spacing:0}
.nav{display:flex;gap:6px;background:rgba(255,255,255,.1);padding:4px;border-radius:12px}
.nav a{border:0;background:transparent;color:#dff0ec;padding:9px 16px;border-radius:9px;font-weight:700;font-size:14px;transition:.18s;display:inline-flex;align-items:center;gap:7px}
.nav a svg{width:15px;height:15px}
.nav a.active{background:#fff;color:var(--teal-700)}
.nav a:hover:not(.active){background:rgba(255,255,255,.12)}

/* ===== Layout ===== */
.wrap{max-width:1080px;margin:0 auto;padding:28px 20px 80px}
.page-head{margin:8px 0 22px}
.page-head h2{font-size:26px;color:var(--teal-700)}
.page-head p{color:#5b6b6b;font-size:15px;margin-top:4px}

/* ===== Cards ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:.2s}
.card:hover{transform:translateY(-3px)}
.card .thumb{aspect-ratio:16/10;background:var(--busy-bg);position:relative;overflow:hidden}
.card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.card .thumb .ph{position:absolute;inset:0;display:grid;place-items:center;color:#9fb1b1;font-size:40px}
.card .price-tag{position:absolute;top:12px;inset-inline-start:12px;background:rgba(12,42,42,.82);color:#fff;padding:5px 12px;border-radius:30px;font-weight:700;font-size:14px;backdrop-filter:blur(4px)}
.card-body{padding:16px 18px;display:flex;flex-direction:column;gap:8px;flex:1}
.card-body h3{font-size:18px;color:var(--ink)}
.card-body .desc{color:#5e6e6e;font-size:14px;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:14px;color:#6c7c7c;font-size:13px;flex-wrap:wrap}
.card-meta span{display:flex;align-items:center;gap:5px}
.btn{border:0;border-radius:11px;padding:11px 18px;font-weight:700;font-size:15px;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--emerald);color:#fff}
.btn-primary:hover:not(:disabled){background:#0e8a6e}
.btn-gold{background:var(--gold);color:#231700}
.btn-gold:hover{background:#b3882f}
.btn-ghost{background:transparent;border:1.5px solid var(--line);color:var(--teal-700)}
.btn-ghost:hover{border-color:var(--emerald);color:var(--emerald)}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

.empty{text-align:center;padding:60px 20px;color:#7d8d8d;border:2px dashed var(--line);border-radius:var(--radius);background:#fff}
.empty .ico{font-size:46px;margin-bottom:10px}
.loading{text-align:center;padding:60px;color:#7d8d8d;font-weight:700}
.spin{width:34px;height:34px;border:3px solid var(--emerald-soft);border-top-color:var(--emerald);border-radius:50%;animation:r .8s linear infinite;margin:0 auto 14px}
@keyframes r{to{transform:rotate(360deg)}}

/* ===== Modal ===== */
.overlay{position:fixed;inset:0;background:rgba(8,28,28,.55);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:20px;width:100%;max-width:600px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);overflow:hidden;animation:pop .22s ease}
@keyframes pop{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(180deg,#fff,#fafcfb)}
.modal-head h3{font-size:19px;color:var(--teal-700)}
.modal-head .x{border:0;background:#f0f3f2;width:34px;height:34px;border-radius:10px;font-size:18px;color:#5b6b6b}
.modal-head .x:hover{background:#e3e9e8}
.modal-body{padding:22px}
.ws-strip{display:flex;gap:14px;align-items:center;background:#f6f9f8;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:18px}
.ws-strip .pic{width:62px;height:62px;border-radius:10px;overflow:hidden;flex:none;background:var(--busy-bg);display:grid;place-items:center;color:#9fb1b1;background-size:cover;background-position:center}
.ws-strip b{color:var(--teal-700)}
.ws-strip .sub{color:#6c7c7c;font-size:14px}

/* ===== Forms ===== */
.field{margin-bottom:16px}
.field label{display:block;font-weight:700;font-size:14px;margin-bottom:6px;color:var(--teal-700)}
.field .hint{font-weight:400;color:#8c9a9a;font-size:12px}
.input,textarea,select{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-size:15px;background:#fbfdfc;transition:.15s;color:var(--ink)}
.input:focus,textarea:focus,select:focus{outline:0;border-color:var(--emerald);background:#fff;box-shadow:0 0 0 3px var(--emerald-soft)}
textarea{resize:vertical;min-height:84px}
.ltr{direction:ltr;text-align:right}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.select-wrap{position:relative}
.select-wrap select{appearance:none;cursor:pointer}
.select-wrap::after{content:"";position:absolute;left:14px;top:50%;width:8px;height:8px;border-left:2.2px solid var(--emerald);border-bottom:2.2px solid var(--emerald);transform:translateY(-70%) rotate(-45deg);pointer-events:none}
/* اختيار مدمج */
.seg{display:flex;gap:8px;flex-wrap:wrap}
.seg label{flex:1;min-width:88px;cursor:pointer}
.seg input{position:absolute;opacity:0;pointer-events:none}
.seg .opt{display:flex;align-items:center;justify-content:center;gap:7px;text-align:center;border:1.5px solid var(--line);background:#fbfdfc;border-radius:11px;padding:11px 8px;font-weight:700;font-size:14px;color:var(--ink);transition:.15s}
.seg .opt svg{width:15px;height:15px;color:var(--emerald)}
.seg input:checked + .opt{border-color:var(--emerald);background:var(--emerald-soft);color:var(--teal-700)}
.disc-note{display:none;align-items:center;gap:7px;background:var(--gold-soft);color:#8a6712;border:1px solid #ecdcb4;border-radius:10px;padding:9px 12px;margin-top:9px;font-weight:700;font-size:13px}
.disc-note.show{display:flex}
.disc-note svg{width:15px;height:15px}
.err{display:none;background:#fdecea;border:1.4px solid #f2c4c0;color:var(--danger);border-radius:11px;padding:10px 14px;margin-bottom:14px;font-weight:700;font-size:14px}
.err.show{display:block}

/* ===== Calendar ===== */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-head .m{font-family:'Reem Kufi';font-size:18px;color:var(--teal-700)}
.cal-nav{border:1.5px solid var(--line);background:#fff;width:36px;height:36px;border-radius:10px;font-size:18px;color:var(--teal-700)}
.cal-nav:hover:not(:disabled){border-color:var(--emerald);color:var(--emerald)}
.cal-nav:disabled{opacity:.4;cursor:not-allowed}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dow{text-align:center;font-size:12px;font-weight:700;color:#8c9a9a;padding:4px 0}
.day{aspect-ratio:1;border-radius:11px;border:1.5px solid transparent;background:var(--busy-bg);color:#aeb9b9;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:15px;position:relative;transition:.15s}
.day.free{background:var(--emerald-soft);color:var(--teal-700);cursor:pointer;border-color:#cdeee3}
.day.free:hover{background:#d4efe7;border-color:var(--emerald)}
.day.free .dot{width:5px;height:5px;border-radius:50%;background:var(--emerald);margin-top:3px}
.day.sel{background:var(--emerald);color:#fff;border-color:var(--emerald);box-shadow:0 6px 16px -6px var(--emerald)}
.day.sel .dot{background:#fff}
.day.empty-cell{background:transparent;border:0}
.legend{display:flex;gap:18px;margin-top:14px;font-size:13px;color:#5e6e6e;flex-wrap:wrap}
.legend i{display:inline-block;width:14px;height:14px;border-radius:5px;margin-inline-end:6px;vertical-align:-2px}
.slots{display:flex;flex-wrap:wrap;gap:9px;margin-top:6px}
.slot{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:9px 15px;font-weight:700;font-size:14px;color:var(--teal-700);transition:.15s}
.slot:hover:not(:disabled){border-color:var(--emerald);color:var(--emerald)}
.slot.sel{background:var(--emerald);color:#fff;border-color:var(--emerald)}

/* ===== Confirmation ===== */
.confirm{text-align:center;padding:8px 4px}
.confirm .seal{width:78px;height:78px;border-radius:50%;background:var(--emerald-soft);display:grid;place-items:center;margin:0 auto 14px;font-size:38px;color:var(--emerald)}
.summary{background:#f6f9f8;border:1px solid var(--line);border-radius:13px;padding:16px;text-align:start;margin:16px 0}
.summary div{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:15px;gap:12px}
.summary div:last-child{border:0}
.summary b{color:var(--teal-700);text-align:left}

.toast{position:fixed;bottom:24px;inset-inline-start:50%;transform:translateX(50%);background:var(--teal-700);color:#fff;padding:13px 22px;border-radius:12px;font-weight:700;z-index:90;box-shadow:var(--shadow);animation:pop .2s}
@media(max-width:560px){
  .row2{grid-template-columns:1fr}
  .brand-name{font-size:17px}
  .nav a{padding:8px 11px;font-size:13px}
  .wrap{padding:20px 14px 70px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">و</div>
    <div>
      <div class="brand-name">منصّة الورش</div>
      <small>احجز ورشتك التدريبية</small>
    </div>
  </div>
  <div class="nav">
    <a class="active">الورش</a>
    <a href="admin.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> دخول المسؤول</a>
  </div>
</div>

<div class="wrap">
  <div class="page-head">
    <h2>الورش التدريبية المتاحة</h2>
    <p>اختر الورشة المناسبة، ثم احجز اليوم والوقت المتاح — بدون حاجة لتسجيل دخول.</p>
  </div>
  <div id="publicGrid" class="grid"><div class="loading" style="grid-column:1/-1"><div class="spin"></div>جارٍ تحميل الورش…</div></div>
</div>

<div id="modalMount"></div>
<div id="toastMount"></div>

<script>
/* ===================== الإعدادات ===================== */
const SUPABASE_URL = 'https://ajgtatisurcpygzernsy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TKQW1nN5DaJg1pH_u2s19Q_9z-8EGWW';
const ADMIN_EMAIL  = 'iks.alalawi@gmail.com';
const WHATSAPP_NUM = '96891312183';
const DISCOUNT_STATUSES = ['طالب','باحث عن عمل'];
const DOW = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const GOVS = ['مسقط','ظفار','مسندم','البريمي','الداخلية','شمال الباطنة','جنوب الباطنة','شمال الشرقية','جنوب الشرقية','الظاهرة','الوسطى'];

let WORKSHOPS=[], SLOTS=[];
let bk=null; /* {ws, month, date, slotId} */

const $=s=>document.querySelector(s);
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(v){ return Number(v)+' ر.ع'; }
function priceTagHtml(w){
  const p=Number(w.price_omr), d=Number(w.discount_percent)||0;
  if(d>0){ const np=+(p*(1-d/100)).toFixed(2); return `<span class="price-tag"><s style="opacity:.65;font-weight:600">${p}</s> ${np} ر.ع</span>`; }
  return `<span class="price-tag">${money(p)}</span>`;
}
function priceLine(w){
  const p=Number(w.price_omr), d=Number(w.discount_percent)||0;
  if(d>0){ const np=+(p*(1-d/100)).toFixed(2); return `<s style="opacity:.6">${p}</s> ${np} ر.ع <span style="color:var(--gold);font-weight:800">· خصم ${d}%</span>`; }
  return money(p);
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDay(s){ return new Date(s+'T00:00:00').toLocaleDateString('ar',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; $('#toastMount').appendChild(t); setTimeout(()=>t.remove(),2600); }

async function api(path, opts={}){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',...(opts.headers||{})},...opts});
  const d=await r.json(); if(!r.ok) throw new Error(d.message||'تعذّر الاتصال'); return d;
}
function openModal(html){ $('#modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ $('#modalMount').innerHTML=''; }

/* ===================== الورش ===================== */
async function loadWorkshops(){
  try{
    WORKSHOPS = await api('workshops?select=*&is_active=eq.true&order=created_at.desc');
    renderPublic();
  }catch(e){ $('#publicGrid').innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ico">⚠️</div><b>تعذّر تحميل الورش</b><p>حاول تحديث الصفحة</p></div>`; }
}
function renderPublic(){
  const g=$('#publicGrid');
  if(!WORKSHOPS.length){ g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ico">🎓</div><b>لا توجد ورش منشورة بعد</b><p>تابعنا قريبًا لإضافة ورش جديدة.</p></div>`; return; }
  g.innerHTML = WORKSHOPS.map(w=>`
    <div class="card">
      <div class="thumb">
        ${w.image_url?`<img src="${esc(w.image_url)}" alt="">`:`<div class="ph">🖼️</div>`}
        ${priceTagHtml(w)}
      </div>
      <div class="card-body">
        <h3>${esc(w.title)}</h3>
        <p class="desc">${esc(w.description||'')}</p>
        <div class="card-meta">
          ${w.duration?`<span>⏱️ ${esc(w.duration)}</span>`:''}
          <span>📅 مواعيد متعددة</span>
        </div>
        <button class="btn btn-primary btn-block" onclick="openBooking('${w.id}')">احجز موعدك</button>
      </div>
    </div>`).join('');
}

/* ===================== نافذة الحجز ===================== */
window.openBooking = async wid=>{
  const w=WORKSHOPS.find(x=>x.id===wid); if(!w) return;
  bk={ ws:w, month:new Date(new Date().getFullYear(),new Date().getMonth(),1), date:null, start:null, end:null };
  openModal(`
    <div class="modal-head"><h3>حجز: ${esc(w.title)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="bkBody"><div class="loading"><div class="spin"></div>جارٍ تحميل المواعيد…</div></div>`);
  try{
    const from=todayStr();
    const to=(()=>{ const d=new Date(); d.setDate(d.getDate()+90); return d.toISOString().slice(0,10); })();
    SLOTS = await api('rpc/get_availability',{method:'POST',body:JSON.stringify({p_from:from,p_to:to})});
    // ابدأ من أقرب شهر فيه مواعيد
    if(SLOTS.length){
      const fs=new Date(SLOTS[0].slot_date+'T00:00:00'); const now=new Date();
      bk.month = (fs.getFullYear()>now.getFullYear()||(fs.getFullYear()===now.getFullYear()&&fs.getMonth()>now.getMonth()))
        ? new Date(fs.getFullYear(),fs.getMonth(),1) : new Date(now.getFullYear(),now.getMonth(),1);
    }
    renderBkBody();
  }catch(e){ $('#bkBody').innerHTML=`<div class="empty"><div class="ico">⚠️</div><b>تعذّر تحميل المواعيد</b></div>`; }
};

function renderBkBody(){
  const w=bk.ws;
  $('#bkBody').innerHTML=`
    <div class="ws-strip">
      <div class="pic" style="${w.image_url?`background-image:url('${esc(w.image_url)}')`:''}">${w.image_url?'':'🖼️'}</div>
      <div><b>${esc(w.title)}</b><div class="sub">${priceLine(w)}${w.duration?' · '+esc(w.duration):''}</div></div>
    </div>
    <div id="calMount"></div>
    <div id="slotMount" style="margin-top:16px"></div>
    <div id="formMount"></div>`;
  renderCalendar();
}

function renderCalendar(){
  const first=bk.month, y=first.getFullYear(), m=first.getMonth();
  const startDow=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const monthName=first.toLocaleDateString('ar',{month:'long',year:'numeric'});
  const now=new Date(); const minMonth=(y<now.getFullYear())||(y===now.getFullYear()&&m<=now.getMonth());
  const slotDates=new Set(SLOTS.map(s=>s.slot_date));

  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="day empty-cell"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const free = slotDates.has(ds) && ds>=todayStr();
    const sel = bk.date===ds;
    cells+=`<div class="day ${free?'free':''} ${sel?'sel':''}" ${free?`onclick="pickDay('${ds}')"`:''}>${d}${free?'<span class="dot"></span>':''}</div>`;
  }
  $('#calMount').innerHTML=`
    <div class="cal-head">
      <button class="cal-nav" onclick="moveMonth(1)">›</button>
      <span class="m">${monthName}</span>
      <button class="cal-nav" onclick="moveMonth(-1)" ${minMonth?'disabled':''}>‹</button>
    </div>
    <div class="cal-grid">${DOW.map(d=>`<div class="dow">${d.slice(0,3)}</div>`).join('')}${cells}</div>
    <div class="legend">
      <span><i style="background:var(--emerald-soft);border:1px solid #cdeee3"></i>يوم متاح</span>
      <span><i style="background:var(--busy-bg)"></i>مشغول / غير متاح</span>
    </div>`;
}
window.moveMonth = dir=>{
  const d=new Date(bk.month); d.setMonth(d.getMonth()+dir);
  const minM=new Date(new Date().getFullYear(),new Date().getMonth(),1);
  if(d<minM) return;
  bk.month=d; bk.date=null; bk.start=null; bk.end=null;
  renderCalendar(); $('#slotMount').innerHTML=''; $('#formMount').innerHTML='';
};
window.pickDay = ds=>{
  bk.date=ds; bk.start=null; bk.end=null;
  renderCalendar();
  const daySlots=SLOTS.filter(s=>s.slot_date===ds).sort((a,b)=>a.start_time<b.start_time?-1:1);
  $('#slotMount').innerHTML=`
    <label style="display:block;font-weight:700;color:var(--teal-700);margin-bottom:8px">الأوقات المتاحة — ${fmtDay(ds)}</label>
    <div class="slots">${daySlots.map(s=>`<button class="slot" onclick="pickSlot('${s.start_time}','${s.end_time}',this)">${esc(s.start_time)} - ${esc(s.end_time)}</button>`).join('')}</div>`;
  $('#formMount').innerHTML='';
};
window.pickSlot = (st,en,el)=>{
  bk.start=st; bk.end=en;
  document.querySelectorAll('#slotMount .slot').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
  renderForm();
};

function renderForm(){
  $('#formMount').innerHTML=`
    <hr style="border:0;border-top:1px solid var(--line);margin:20px 0">
    <div class="err" id="bkErr"></div>
    <div class="field"><label>الاسم الكامل</label><input class="input" id="bkName" placeholder="اكتب اسمك الثلاثي"></div>
    <div class="row2">
      <div class="field"><label>رقم الجوال / واتساب</label><input class="input ltr" id="bkPhone" placeholder="مثال: 9XXXXXXX" inputmode="tel"></div>
      <div class="field"><label>البريد الإلكتروني <span class="hint">(اختياري)</span></label><input class="input ltr" id="bkEmail" placeholder="example@email.com" inputmode="email"></div>
    </div>
    <div class="field"><label>النوع</label>
      <div class="seg" id="bkGender">
        <label><input type="radio" name="bkg" value="ذكر"><span class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="10" cy="14" r="5"/><path d="M14 10l6-6M15 4h5v5" stroke-linecap="round" stroke-linejoin="round"/></svg> ذكر</span></label>
        <label><input type="radio" name="bkg" value="أنثى"><span class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="9" r="5"/><path d="M12 14v7M9 18h6" stroke-linecap="round"/></svg> أنثى</span></label>
      </div>
    </div>
    <div class="field"><label>المحافظة</label>
      <div class="select-wrap"><select class="input" id="bkGov"><option value="" selected disabled>اختر محافظتك</option>${GOVS.map(g=>`<option>${g}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>الحالة</label>
      <div class="seg" id="bkStatus">
        <label><input type="radio" name="bks" value="طالب"><span class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 3 6 3s6-2 6-3v-5"/></svg> طالب</span></label>
        <label><input type="radio" name="bks" value="موظف"><span class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> موظف</span></label>
        <label><input type="radio" name="bks" value="باحث عن عمل"><span class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> باحث عن عمل</span></label>
      </div>
      <div class="disc-note" id="bkDisc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> مبروك! تم تطبيق خصم ٥٠٪ على الرسوم</div>
    </div>
    <div class="field"><label>ملاحظة <span class="hint">(اختياري)</span></label><textarea id="bkNote" placeholder="أي ملاحظة تود إضافتها"></textarea></div>
    <button class="btn btn-primary btn-block" onclick="confirmBooking()">تأكيد الحجز</button>`;
  document.querySelectorAll('input[name=bks]').forEach(r=>r.addEventListener('change',()=>{
    $('#bkDisc').classList.toggle('show', DISCOUNT_STATUSES.includes((document.querySelector('input[name=bks]:checked')||{}).value));
  }));
  $('#formMount').scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function confirmBooking(){
  const name=$('#bkName').value.trim(), phone=$('#bkPhone').value.trim(), email=$('#bkEmail').value.trim();
  const gov=$('#bkGov').value, note=$('#bkNote').value.trim();
  const gender=(document.querySelector('input[name=bkg]:checked')||{}).value;
  const status=(document.querySelector('input[name=bks]:checked')||{}).value;
  const err=$('#bkErr');
  const fail=m=>{ err.textContent='⚠️ '+m; err.classList.add('show'); };
  if(!name||!phone){ fail('يرجى إدخال الاسم ورقم الجوال'); return; }
  if(phone.replace(/\D/g,'').length<8){ fail('يرجى إدخال رقم جوال صحيح'); return; }
  if(!gender){ fail('يرجى اختيار النوع'); return; }
  if(!gov){ fail('يرجى اختيار المحافظة'); return; }
  if(!status){ fail('يرجى اختيار الحالة'); return; }
  err.classList.remove('show');
  const btn=event.target; btn.disabled=true; btn.textContent='جارٍ تأكيد الحجز…';
  try{
    const res=await api('rpc/book_time',{method:'POST',body:JSON.stringify({
      p_workshop_id:bk.ws.id, p_name:name, p_phone:phone, p_email:email||null,
      p_gender:gender, p_governorate:gov, p_status:status, p_notes:note||null,
      p_date:bk.date, p_start:bk.start, p_end:bk.end
    })});
    if(!res.ok){ fail(res.error); btn.disabled=false; btn.textContent='تأكيد الحجز'; return; }
    const timeTxt=`${bk.start} - ${bk.end}`;
    const priceTxt=(res.promo>0||res.status_discount)
      ? `${res.price} ر.ع (بدل ${res.base_price})`
      : `${res.price} ر.ع`;

    /* إشعار تلقائي إلى بريد المنظّم */
    fetch(`https://formsubmit.co/ajax/${ADMIN_EMAIL}`,{method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({_subject:`🗓️ حجز جديد: ${name} — ${bk.ws.title}`,_template:'table',_replyto:email||'',
        'الورشة':bk.ws.title,'اليوم':fmtDay(bk.date),'الوقت':timeTxt,'الاسم':name,'رقم الجوال':phone,
        'البريد':email||'لا يوجد','النوع':gender,'المحافظة':gov,'الحالة':status,'الرسوم':priceTxt,'ملاحظة':note||'لا يوجد'})
    }).catch(()=>{});

    showConfirmation({name,phone,email,gender,gov,status,note,timeTxt,priceTxt});
  }catch(e){ fail('تعذّر إتمام الحجز، حاول مجددًا'); btn.disabled=false; btn.textContent='تأكيد الحجز'; }
}

function showConfirmation(o){
  const wa=WHATSAPP_NUM.replace(/\D/g,'');
  const txt=encodeURIComponent(
    `*حجز جديد في ورشة تدريبية*\n——————————————\n`+
    `الورشة: ${bk.ws.title}\nاليوم: ${fmtDay(bk.date)}\nالوقت: ${o.timeTxt}\n`+
    `الاسم: ${o.name}\nرقم الجوال: ${o.phone}\n`+(o.email?`البريد: ${o.email}\n`:'')+
    `النوع: ${o.gender}\nالمحافظة: ${o.gov}\nالحالة: ${o.status}\nالرسوم: ${o.priceTxt}`+
    (o.note?`\nملاحظة: ${o.note}`:''));
  $('#bkBody').innerHTML=`
    <div class="confirm">
      <div class="seal">✓</div>
      <h3 style="color:var(--teal-700);font-size:22px">تم تأكيد حجزك</h3>
      <p style="color:#6c7c7c">احتفظ بهذه التفاصيل، وسنتواصل معك لتأكيد الحضور.</p>
      <div class="summary">
        <div><span>الورشة</span><b>${esc(bk.ws.title)}</b></div>
        <div><span>اليوم</span><b>${fmtDay(bk.date)}</b></div>
        <div><span>الوقت</span><b>${esc(o.timeTxt)}</b></div>
        <div><span>الاسم</span><b>${esc(o.name)}</b></div>
        <div><span>الحالة</span><b>${esc(o.status)}</b></div>
        <div><span>الرسوم</span><b>${esc(o.priceTxt)}</b></div>
      </div>
      <a class="btn btn-gold btn-block" href="https://api.whatsapp.com/send?phone=${wa}&text=${txt}" target="_blank" rel="noopener">🟢 إرسال تأكيد عبر واتساب</a>
      <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="closeModal()">تم</button>
    </div>`;
}

loadWorkshops();
</script>
